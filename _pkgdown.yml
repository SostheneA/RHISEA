url: https://sosthenea.github.io/RHISEA/

template:
  bootstrap: 5
  bootswatch: flatly

home:
  title: "RHISEA"
  description: "An R package for flexible and reproducible mixed-stock analysis in fisheries and ecology"
  strip_header: false

sidebar:
  structure: [links, license, community, citation, dev, authors]
  components:
    dev:
      title: "Dev status"
      contents:
        - text: ~
          href: https://github.com/SostheneA/RHISEA/actions/workflows/R-CMD-check.yaml
          image: https://github.com/SostheneA/RHISEA/actions/workflows/R-CMD-check.yaml/badge.svg
        - text: ~
          href: https://sosthenea.r-universe.dev/RHISEA
          image: https://sosthenea.r-universe.dev/badges/RHISEA

navbar:
  structure:
    left:  [home, reference, articles, news]
    right: [github]
  components:
    home:
      icon: fas fa-home
      href: index.html
      aria-label: Home
    github:
      icon: fab fa-github
      href: https://github.com/SostheneA/RHISEA
      aria-label: "GitHub repository"

articles:
  - title: Getting Started
    contents:
      - RHISEA_comprehensive_Guide
      - RHISEA_data_type

  - title: Comparisons & Performance
    contents:
      - RHISEA_vs_Fortran

  - title: Advanced Modeling
    contents:
      - Custom_Classification_Models
      - Multiple_Classifiers
      - complex_mixed_stocks
      - Estimate_genetics_data

reference:
  - title: 'Main Analysis Functions'
    desc: Core functions to run HISEA analyses
    contents:
      - run_hisea_all
      - run_hisea_estimates
      - simulate_mixture
      - create_hisea_summary_report

  - title: 'Data Input and Output'
    desc: Tools to prepare and process data
    contents:
      - read_baseline
      - read_mixture
      - write_mix_from_dataframe
      - write_std_from_dataframe
      - process_hisea_input
      - baseline
      - mixture

  - title: 'Estimators and Algorithms'
    desc: Statistical implementations
    contents:
      - accel_em_algorithm
      - em_algorithm
      - compute_cook_estimators
      - estimate_millar_theta4
      - estimate_ml_theta5
      - get_phi

  - title: 'Classification & Visualization'
    contents:
      - classify_samples
      - compute_ldf_coefficients
      - ordvec
      - plot_hisea_theta
      - print_hisea_summary

  - title: 'Internal Helpers'
    contents:
      - .resample_baseline_data_helper
