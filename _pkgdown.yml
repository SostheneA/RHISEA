url: https://sosthenea.github.io/RHISEA/

template:
  bootstrap: 5

home:
  title: "RHISEA"
  description: "RHISEA: An R package for flexible and reproducible mixed-stock analysis in fisheries and ecology"
  strip_header: false

sidebar:
  structure: [links, license, community, citation, dev]
  components:
    dev:
      title: "Dev status"
      contents:
        - name: R-CMD-check
          url: https://github.com/SostheneA/RHISEA/actions/workflows/R-CMD-check.yaml
          img: https://github.com/SostheneA/RHISEA/actions/workflows/R-CMD-check.yaml/badge.svg
        - name: R-universe
          url: https://sosthenea.r-universe.dev/RHISEA
          img: https://sosthenea.r-universe.dev/badges/RHISEA

navbar:
  structure:
    left:
      - home
      - reference
      - articles
    right:
      - github
  components:
    github:
      icon: fa-github
      aria-label: "GitHub repository"
      href: https://github.com/SostheneA/RHISEA

# Articles directly listed on the "Articles" page
articles:
- title: Tutorials
  navbar: ~
  contents:
  - RHISEA_comprehensive_Guide
  - RHISEA_vs_Fortran
  - Custom_Classification_Models
  - Multiple_Classifiers
  - RHISEA_data_type
  - complex_mixed_stocks
  - Estimate_genetics_data


# Function reference, organized in sections
reference:
  - title: 'Main Analysis Functions'
    desc: |
      Core functions to run HISEA analyses
    contents:
      - run_hisea_all
      - run_hisea_estimates
      - simulate_mixture
      - create_hisea_summary_report

  - title: 'Data Input and Output'
    desc: |
      Functions to read, write, and prepare data for analysis
    contents:
      - read_baseline
      - read_mixture
      - write_mix_from_dataframe
      - write_std_from_dataframe
      - process_hisea_input
      - baseline
      - mixture

  - title: 'Estimators and Algorithms'
    desc: |
      Implementations of statistical estimators and algorithms
    contents:
      - accel_em_algorithm
      - em_algorithm
      - compute_cook_estimators
      - estimate_millar_theta4
      - estimate_ml_theta5
      - get_phi

  - title: 'Classification Tools'
    desc: |
      Functions for classification models and related utilities
    contents:
      - classify_samples
      - compute_ldf_coefficients
      - ordvec

  - title: 'Visualization and Output'
    desc: |
      Plotting and summary printing functions
    contents:
      - plot_hisea_theta
      - print_hisea_summary

  - title: 'Internal Helpers'
    desc: |
      Helper functions not usually called directly by users
    contents:
      - .resample_baseline_data_helper
